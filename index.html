<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ganesula Pradeep Krishna | Elite Portfolio</title>

<!-- ✅ GOOGLE VERIFICATION META TAG -->
<meta name="google-site-verification" content="4rFfRPqOhtG4fa9gkAhc5XM6UL6d-MdPT8piGLuXBP8" />

<meta name="description" content="Portfolio of Ganesula Pradeep Krishna - Python Developer, Projects, Skills">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
/* SAME CSS (unchanged) */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
html{scroll-behavior:smooth;}
body{background:#020617;color:#fff}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#020617;
flex-wrap:wrap;
}

header h1{color:#38bdf8}

nav button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#1e293b;
color:#fff;
cursor:pointer;
transition:0.3s;
}

nav button:hover{background:#38bdf8;color:#000;}
nav button.active-btn{background:#38bdf8;color:#000;}

.section{display:none;padding:40px 60px}
.active{display:block}

.main{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
}

.profile-container{
display:flex;
gap:50px;
align-items:center;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(56,189,248,0.3);
animation:float 4s ease-in-out infinite;
position:relative;
overflow:hidden;
flex-wrap:wrap;
}

.profile-container::before{
content:'';
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle, rgba(56,189,248,0.25), transparent);
top:-50px;
left:-50px;
z-index:0;
}

.profile-container *{z-index:1}

.profile-img{
width:200px;height:200px;border-radius:50%;object-fit:cover;
border:4px solid #38bdf8;box-shadow:0 0 25px #38bdf8;
transition:0.4s;
}

.profile-img:hover{
transform:scale(1.08);
box-shadow:0 0 50px #38bdf8;
}

.profile-info h2{font-size:36px}
.profile-info h3{color:#38bdf8;margin-top:10px}
.profile-info p{margin-top:15px;color:#94a3b8;max-width:500px}

.typing{color:#38bdf8;font-size:20px;margin-top:10px;min-height:24px;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;margin-top:20px;
}

.card{
background:#020617;padding:20px;border-radius:15px;
box-shadow:0 0 20px rgba(56,189,248,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 0 25px #38bdf8;
}

.btn{
display:inline-block;margin-top:10px;padding:8px 15px;
background:#38bdf8;color:#000;border-radius:6px;
text-decoration:none;font-size:14px;
}

footer{
padding:30px;text-align:center;
border-top:1px solid #1e293b;
}

footer a{
margin:0 10px;color:#38bdf8;text-decoration:none;
}

@media(max-width:768px){
.profile-container{flex-direction:column;text-align:center;}
.main{height:auto;padding:40px 0;}
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}
}
</style>
</head>

<body>

<header>
<h1>Portfolio</h1>
<nav>
<button onclick="showSection(event,'home')" class="active-btn">Home</button>
<button onclick="showSection(event,'about')">Personal Info</button>
<button onclick="showSection(event,'skills')">Skills</button>
<button onclick="showSection(event,'projects')">Projects</button>
<button onclick="showSection(event,'contact')">Contact</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="main">
<div class="profile-container" data-aos="fade-up">

<img src="https://res.cloudinary.com/dccouvjkt/image/upload/v1774623520/WhatsApp_Image_2026-03-27_at_8.09.29_PM_cza7et.jpg" class="profile-img">

<div class="profile-info">
<h2>Ganesula Pradeep Krishna</h2>
<h3>Python Developer</h3>

<div class="typing" id="typing"></div>

<p>Aspiring developer passionate about building real-world solutions using Python and AI.</p>

</div>
</div>
</div>
</div>

<!-- PROJECTS (AUTO FROM GITHUB) -->
<div id="projects" class="section">
<h2>Projects (Auto from GitHub)</h2>
<div class="cards" id="repoContainer"></div>
</div>

<footer>
<p>Connect with me:</p>
<a href="https://www.linkedin.com/in/pradeep-ganeshula-817093381/" target="_blank">LinkedIn</a>
<a href="https://github.com/pradeepganeshula09-dotcom" target="_blank">GitHub</a>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

// ✅ FETCH PROJECTS FROM GITHUB
fetch("https://api.github.com/users/pradeepganeshula09-dotcom/repos")
.then(res => res.json())
.then(data => {
let container = document.getElementById("repoContainer");

data.slice(0,6).forEach(repo => {
let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>${repo.name}</h3>
<p>${repo.description || "No description available"}</p>
<a class="btn" href="${repo.html_url}" target="_blank">View Code</a>
`;

container.appendChild(card);
});
});

// Typing animation
const roles=["AI Enthusiast","Problem Solver","Full Stack Learner"];
let ri=0,rj=0,currentRole='',deleting=false;

function typeRole(){
currentRole=roles[ri];
if(!deleting){rj++;} else {rj--;}
document.getElementById('typing').innerHTML=currentRole.substring(0,rj);

if(!deleting && rj===currentRole.length){
deleting=true;setTimeout(typeRole,1000);return;
}

if(deleting && rj===0){
deleting=false;ri=(ri+1)%roles.length;
}

setTimeout(typeRole,deleting?50:100);
}
typeRole();

function showSection(e,id){
document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('nav button').forEach(btn=>btn.classList.remove('active-btn'));
e.target.classList.add('active-btn');
}
</script>

</body>
</html>
